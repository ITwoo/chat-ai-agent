name: Deploy to EC2

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}
  API_IMAGE: ghcr.io/itwoo/chat-ai-agent-api
  WEB_IMAGE: ghcr.io/itwoo/chat-ai-agent-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
          provenance: false
          sbom: false

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
          provenance: false
          sbom: false

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get GitHub Actions runner public IP
        run: |
          RUNNER_IP="$(curl -s https://checkip.amazonaws.com)"
          echo "RUNNER_IP=${RUNNER_IP}" >> "$GITHUB_ENV"
          echo "Runner IP: ${RUNNER_IP}"

      - name: Allow SSH from current runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --region "${{ vars.AWS_REGION }}" \
            --group-id "${{ vars.EC2_SECURITY_GROUP_ID }}" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${RUNNER_IP}/32,Description='github-actions-deploy'}]" \
          || true

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/chat-ai-agent-key.pem
          chmod 600 ~/.ssh/chat-ai-agent-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/chat-ai-agent-key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << EOF
            set -e

            cd /home/ec2-user/projects/chat-ai-agent

            echo "===== update source ====="
            git fetch origin main
            git reset --hard origin/main

            echo "===== login to GHCR ====="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "===== write image tag ====="
            echo "IMAGE_TAG=${{ github.sha }}" > .env.deploy

            echo "===== compose config ====="
            docker compose --env-file .env.deploy -f docker-compose.ec2.yml config

            echo "===== pull images ====="
            docker compose --env-file .env.deploy -f docker-compose.ec2.yml pull

            echo "===== run migrations ====="
            docker compose --env-file .env.deploy -f docker-compose.ec2.yml run --rm --no-deps api pnpm exec prisma migrate deploy

            echo "===== deploy containers ====="
            docker compose --env-file .env.deploy -f docker-compose.ec2.yml up -d --remove-orphans

            echo "===== verify containers ====="
            docker compose --env-file .env.deploy -f docker-compose.ec2.yml ps

            echo "===== verify image tags ====="
            docker inspect chat-ai-agent-web --format '{{.Config.Image}}'
            docker inspect chat-ai-agent-api --format '{{.Config.Image}}'

            echo "===== verify nginx config ====="
            docker compose --env-file .env.deploy -f docker-compose.ec2.yml exec -T web grep -n "server_name" /etc/nginx/conf.d/default.conf

            echo "===== prune old dangling images ====="
            docker image prune -f
          EOF

      - name: Revoke SSH from current runner IP
        if: always() && env.RUNNER_IP != ''
        run: |
          aws ec2 revoke-security-group-ingress \
            --region "${{ vars.AWS_REGION }}" \
            --group-id "${{ vars.EC2_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" \
          || true