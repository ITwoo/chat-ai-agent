services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: chat-ai-agent-api
    env_file:
      - /home/ec2-user/env/chat-ai-agent-api.env
    expose:
      - "3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: chat-ai-agent-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped